- name: Build, Tag, and Push Image to ECR
      # Entramos a la carpeta donde está tu código real (pom.xml y src)
      working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: back-despachos-repo # <-- Nombre corregido
        IMAGE_TAG: latest
      run: |
        # Le indicamos explícitamente con -f dónde está el Dockerfile huérfano
        docker build -f ../Springboot-API-REST/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to Amazon ECS
      run: |
        # Nombres de cluster y servicio corregidos
        aws ecs update-service --cluster innova-cluster --service back-despachos-service --force-new-deployment --region us-east-1
